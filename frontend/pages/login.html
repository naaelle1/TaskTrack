<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Task Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">ꕤ Task Tracker</a>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Enter your details to access your workspace</p>
        </div>
        <form id="login-form" class="auth-form" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="name@school.edu" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary btn-full">Sign In</button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html" class="auth-link">Create an account</a></p>
        </div>
    </div>
</body>
</html>
