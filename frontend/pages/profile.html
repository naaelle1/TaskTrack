<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTrack - Profile Settings</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="saas-navbar">
        <a href="dashboard.html" class="logo-container">
            <div class="logo-mark"><i class="fa-solid fa-feather-pointed"></i></div>
            <span class="logo-text">TaskTrack</span>
        </a>

        <div class="nav-right">
            <a href="dashboard.html" class="nav-text-link"><i class="fa-solid fa-arrow-left"></i> Back</a>
        </div>
    </nav>

    <main class="workspace">
        <div class="form-page-header">
            <div>
                <h1><i class="fa-solid fa-user-circle"></i> Profile Settings</h1>
                <p>Manage your account information</p>
            </div>
        </div>

        <div class="form-container">
            <div class="profile-card">
                <div class="profile-avatar-section">
                    <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=Felix" alt="User Avatar" class="profile-avatar-large">
                </div>

                <form id="profileForm" class="task-form" style="margin-top: 30px;">
                    <div class="form-section">
                        <div class="form-group">
                            <label for="profileUsername">
                                <span class="label-text">Username</span>
                            </label>
                            <input type="text" id="profileUsername" class="input-control" placeholder="Your username" required>
                            <p class="form-hint">This is your public profile name</p>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-group">
                            <label for="profileEmail">
                                <span class="label-text">Email Address</span>
                            </label>
                            <input type="email" id="profileEmail" class="input-control" disabled>
                            <p class="form-hint">Your email address cannot be changed</p>
                        </div>
                    </div>

                    <div class="form-divider"></div>

                    <div class="form-actions">
                        <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fa-solid fa-check"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
</body>
</html>
