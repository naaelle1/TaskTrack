<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Task Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">ꕤ Task Tracker</a>
            <h1 class="auth-title">Create an account</h1>
            <p class="auth-subtitle">Start tracking your academic journey seamlessly</p>
        </div>
        <form id="register-form" class="auth-form" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div class="form-group">
                <label for="reg-name" class="form-label">Full Name</label>
                <input type="text" id="reg-name" class="form-input" placeholder="Nana" required>
            </div>
            <div class="form-group">
                <label for="reg-email" class="form-label">Email Address</label>
                <input type="email" id="reg-email" class="form-input" placeholder="nana@school.edu" required>
            </div>
            <div class="form-group">
                <label for="reg-password" class="form-label">Password</label>
                <input type="password" id="reg-password" class="form-input" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="reg-confirm-password" class="form-label">Confirm Password</label>
                <input type="password" id="reg-confirm-password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary btn-full">Create Account</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="login.html" class="auth-link">Log in instead</a></p>
        </div>
    </div>
</body>
</html>
